services:
  mongodb:
    image: mongo:7
    container_name: praxis-form-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: praxis-form
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
    container_name: praxis-form-server
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongodb:27017/praxis-form
      JWT_SECRET: change-this-secret-in-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123

  client:
    build:
      context: ./client
    container_name: praxis-form-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost:4000/api

volumes:
  mongo-data:

